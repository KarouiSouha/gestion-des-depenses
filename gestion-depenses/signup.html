<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonBudget - Inscription</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <div class="row justify-content-center align-items-center vh-100">
        <div class="col-md-6 col-lg-4">
            <div class="login-card">
                <h2 class="text-center mb-3 text-primary">MonBudget</h2>
                <p class="text-center text-muted mb-4">Créez votre compte</p>

                <!-- Message erreur -->
                <div id="signupAlert" class="alert alert-danger d-none">
                    <span id="signupAlertMsg">Une erreur est survenue.</span>
                </div>

                <form id="signupForm">
                    <div class="mb-3">
                        <label class="form-label">Nom complet</label>
                        <input type="text" id="name" class="form-control" placeholder="Votre nom" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Adresse e-mail</label>
                        <input type="email" id="email" class="form-control" placeholder="exemple@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mot de passe</label>
                        <div class="input-group">
                            <input type="password" id="password" class="form-control" placeholder="Mot de passe (6 caractères min.)" required minlength="6">
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">Afficher</button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirmer le mot de passe</label>
                        <input type="password" id="confirmPassword" class="form-control" placeholder="Retapez le mot de passe" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">S'inscrire</button>
                </form>

                <hr>

                <p class="text-center mb-0">
                    Déjà un compte ? <a href="index.html">Se connecter</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
<script>
    document.getElementById("togglePassword").addEventListener("click", function () {
        const password = document.getElementById("password");
        if (password.type === "password") {
            password.type = "text";
            this.textContent = "Masquer";
        } else {
            password.type = "password";
            this.textContent = "Afficher";
        }
    });

    function showError(message) {
        const alertBox = document.getElementById("signupAlert");
        document.getElementById("signupAlertMsg").textContent = message;
        alertBox.classList.remove("d-none");
        setTimeout(() => {
            alertBox.classList.add("d-none");
        }, 3000);
    }

    document.getElementById("signupForm").addEventListener("submit", function (e) {
        e.preventDefault();
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        if (password.length < 6) {
            showError("Le mot de passe doit contenir au moins 6 caractères.");
            return;
        }
        if (password !== confirmPassword) {
            showError("Les mots de passe ne correspondent pas.");
            return;
        }

        const result = App.register(name, email, password);
        if (result.ok) {
            window.location.href = "dashboard.html";
        } else {
            showError(result.error);
        }
    });

    if (App.isLoggedIn()) {
        window.location.href = "dashboard.html";
    }
</script>
</body>
</html>
