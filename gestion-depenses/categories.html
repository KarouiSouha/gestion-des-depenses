<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonBudget - Catégories</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container-fluid">
<div class="row">
<!-- ================= MENU ================= -->
<nav class="col-md-3 col-lg-2 sidebar d-none d-md-block" id="sidebar">
    <h3 class="text-center mt-3 mb-4">💰 MonBudget</h3>
    <ul class="nav flex-column">
        <li class="nav-item"><a href="dashboard.html" class="nav-link">📊 Tableau de bord</a></li>
        <li class="nav-item"><a href="depenses.html" class="nav-link">🧾 Dépenses</a></li>
        <li class="nav-item"><a href="categories.html" class="nav-link active">🏷️ Catégories</a></li>
        <li class="nav-item"><a href="graphiques.html" class="nav-link">📈 Graphiques</a></li>
    </ul>
    <hr>
    <button class="btn btn-danger w-100" onclick="App.logout()">🚪 Déconnexion</button>
</nav>
<!-- ================= CONTENU ================= -->
<main class="col-md-9 col-lg-10 main-content">
<header class="topbar d-flex justify-content-between align-items-center">
    <button class="btn btn-outline-primary d-md-none" onclick="toggleSidebar()">☰ Menu</button>
    <h3>🏷️ Catégories</h3>
    <div>Bonjour, <span id="userGreeting"></span> 👋</div>
</header>

<div class="mt-4">
<div class="d-flex justify-content-between align-items-center flex-wrap mb-4">
    <div>
        <h2>Gestion des catégories</h2>
        <p class="text-muted">Organisez vos dépenses avec des catégories personnalisées.</p>
    </div>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#catModal" onclick="openCatModal()">➕ Nouvelle catégorie</button>
</div>

<!-- ================= GRILLE DES CATÉGORIES ================= -->
<div class="row" id="catGrid"></div>
</div>

<!-- ================= POPUP AJOUT / MODIFICATION ================= -->
<div class="modal fade" id="catModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="catModalTitle">🏷️ Nouvelle catégorie</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="catEditId">
                <div class="mb-3">
                    <label class="form-label">Nom *</label>
                    <input type="text" id="catName" class="form-control" placeholder="Ex: Vacances">
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <input type="text" id="catDesc" class="form-control" placeholder="Description optionnelle...">
                </div>
                <div class="mb-3">
                    <label class="form-label">Couleur</label>
                    <div class="d-flex align-items-center gap-2 flex-wrap">
                        <input type="color" id="catColor" value="#5C7AEA" class="form-control form-control-color">
                        <div id="colorPresets" class="d-flex flex-wrap gap-1"></div>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Icône</label>
                    <div class="row row-cols-4 g-2" id="iconGrid"></div>
                    <input type="hidden" id="catIcon" value="❓">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                <button class="btn btn-primary" onclick="saveCat()">💾 Enregistrer</button>
            </div>
        </div>
    </div>
</div>

<!-- ================= POPUP CONFIRMATION SUPPRESSION ================= -->
<div class="modal fade" id="deleteCatModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-body text-center">
                <div style="font-size:40px;">🗑️</div>
                <h5>Supprimer cette catégorie ?</h5>
                <p class="text-muted" id="deleteCatWarning"></p>
                <div class="d-flex justify-content-center gap-2 mt-3">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button class="btn btn-danger" id="confirmCatDelete">Supprimer</button>
                </div>
            </div>
        </div>
    </div>
</div>

</main>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
App.requireAuth();
document.getElementById('userGreeting').textContent = App.getUser().name;

let deleteTarget = null;

const catModal = new bootstrap.Modal(document.getElementById('catModal'));
const deleteCatModal = new bootstrap.Modal(document.getElementById('deleteCatModal'));

const COLOR_PRESETS = ['#5C7AEA','#F97316','#10B981','#EF4444','#8B5CF6','#F59E0B','#06B6D4','#EC4899','#84CC16','#6B7280'];
const ICON_OPTIONS = ['🍽️','🚗','🏠','❤️','🎬','📶','📚','➖','👕','✈️','🎮','🏋️','🎵','🎁','🐾','⭐'];

// Construire les pastilles de couleur
const presets = document.getElementById('colorPresets');
COLOR_PRESETS.forEach(function (color) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn btn-sm';
    btn.style.background = color;
    btn.style.width = '25px';
    btn.style.height = '25px';
    btn.title = color;
    btn.onclick = function () { document.getElementById('catColor').value = color; };
    presets.appendChild(btn);
});

// Construire la grille d'icônes
const iconGrid = document.getElementById('iconGrid');
ICON_OPTIONS.forEach(function (icon) {
    const col = document.createElement('div');
    col.className = 'col';
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn btn-outline-secondary w-100 icon-btn';
    btn.dataset.icon = icon;
    btn.textContent = icon;
    btn.onclick = function () {
        document.querySelectorAll('.icon-btn').forEach(function (b) { b.classList.remove('active', 'btn-primary'); b.classList.add('btn-outline-secondary'); });
        btn.classList.add('active', 'btn-primary');
        btn.classList.remove('btn-outline-secondary');
        document.getElementById('catIcon').value = icon;
    };
    col.appendChild(btn);
    iconGrid.appendChild(col);
});

function renderGrid() {
    const cats = App.getCategories();
    const expenses = App.getExpenses();
    const grid = document.getElementById('catGrid');

    grid.innerHTML = cats.map(function (c) {
        const count = expenses.filter(function (e) { return e.category === c.name; }).length;
        const total = expenses.filter(function (e) { return e.category === c.name; }).reduce(function (s, e) { return s + e.amount; }, 0);
        return '<div class="col-md-6 col-lg-4 mb-4">' +
            '<div class="card shadow-sm h-100">' +
                '<div class="card-body">' +
                    '<div class="d-flex align-items-center gap-2 mb-3">' +
                        '<span class="cat-card-icon" style="background:' + c.color + '">' + c.icon + '</span>' +
                        '<div>' +
                            '<div class="fw-bold">' + c.name + '</div>' +
                            '<div class="text-muted small">' + (c.description || 'Aucune description') + '</div>' +
                        '</div>' +
                    '</div>' +
                    '<div class="d-flex justify-content-between mb-3">' +
                        '<span>🧾 ' + count + ' dépense' + (count > 1 ? 's' : '') + '</span>' +
                        '<span class="fw-bold" style="color:' + c.color + '">' + total.toFixed(3) + ' DT</span>' +
                    '</div>' +
                    '<div class="d-flex justify-content-between">' +
                        '<button class="btn btn-sm btn-outline-primary" onclick="editCat(' + c.id + ')">✏️ Modifier</button>' +
                        (!c.isDefault ? '<button class="btn btn-sm btn-outline-danger" onclick="confirmDelCat(' + c.id + ')">🗑️ Supprimer</button>' : '<span class="badge bg-success">Défaut</span>') +
                    '</div>' +
                '</div>' +
            '</div>' +
        '</div>';
    }).join('');
}

function openCatModal(cat) {
    cat = cat || null;
    document.getElementById('catEditId').value = cat ? cat.id : '';
    document.getElementById('catName').value = cat ? cat.name : '';
    document.getElementById('catDesc').value = cat ? (cat.description || '') : '';
    document.getElementById('catColor').value = cat ? cat.color : '#5C7AEA';
    document.getElementById('catIcon').value = cat ? cat.icon : '❓';
    document.getElementById('catModalTitle').textContent = cat ? '✏️ Modifier la catégorie' : '🏷️ Nouvelle catégorie';

    document.querySelectorAll('.icon-btn').forEach(function (b) {
        const isActive = b.dataset.icon === (cat ? cat.icon : '❓');
        b.classList.toggle('active', isActive);
        b.classList.toggle('btn-primary', isActive);
        b.classList.toggle('btn-outline-secondary', !isActive);
    });
}

function editCat(id) {
    const cat = App.getCategories().find(function (c) { return c.id === id; });
    if (cat) {
        openCatModal(cat);
        catModal.show();
    }
}

function saveCat() {
    const name = document.getElementById('catName').value.trim();
    if (!name) { alert('Veuillez entrer un nom.'); return; }

    const data = {
        name: name,
        description: document.getElementById('catDesc').value.trim(),
        color: document.getElementById('catColor').value,
        icon: document.getElementById('catIcon').value
    };

    const id = document.getElementById('catEditId').value;
    if (id) {
        App.updateCategory(parseInt(id), data);
    } else {
        App.addCategory(data);
    }

    catModal.hide();
    renderGrid();
}

function confirmDelCat(id) {
    deleteTarget = id;
    const cat = App.getCategories().find(function (c) { return c.id === id; });
    const count = App.getExpenses().filter(function (e) { return e.category === (cat ? cat.name : null); }).length;
    document.getElementById('deleteCatWarning').textContent = count
        ? 'Attention : ' + count + ' dépense(s) utilisent cette catégorie.'
        : 'Cette action est irréversible.';
    deleteCatModal.show();
}

document.getElementById('confirmCatDelete').addEventListener('click', function () {
    if (deleteTarget !== null) {
        App.deleteCategory(deleteTarget);
        deleteTarget = null;
        deleteCatModal.hide();
        renderGrid();
    }
});

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('d-none');
}

renderGrid();
</script>
</body>
</html>
