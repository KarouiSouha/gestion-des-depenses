<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MonBudget – Catégories</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body class="app-layout">

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon"><i class="fa-solid fa-wallet"></i></span>
      <span class="brand-name">MonBudget</span>
    </div>
    <ul class="sidebar-nav">
      <li><a href="dashboard.html"><i class="fa-solid fa-house"></i><span>Tableau de bord</span></a></li>
      <li><a href="depenses.html"><i class="fa-solid fa-receipt"></i><span>Dépenses</span></a></li>
      <li><a href="categories.html" class="active"><i class="fa-solid fa-tags"></i><span>Catégories</span></a></li>
      <li><a href="graphiques.html"><i class="fa-solid fa-chart-pie"></i><span>Graphiques</span></a></li>
    </ul>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="App.logout()">
        <i class="fa-solid fa-right-from-bracket"></i><span>Déconnexion</span>
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <button class="btn-toggle-sidebar" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
      <div class="topbar-title">Catégories</div>
      <div class="topbar-user">
        <span id="userGreeting"></span>
        <span class="user-avatar"><i class="fa-solid fa-user"></i></span>
      </div>
    </header>

    <div class="page-body">
      <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
        <div>
          <h1 class="page-title">Gestion des catégories</h1>
          <p class="page-sub">Organisez vos dépenses avec des catégories personnalisées.</p>
        </div>
        <button class="btn btn-primary" onclick="openCatModal()">
          <i class="fa-solid fa-plus me-2"></i>Nouvelle catégorie
        </button>
      </div>

      <div class="row g-3" id="catGrid">
        <!-- Rendered by JS -->
      </div>
    </div>
  </main>

  <!-- Modal Add/Edit Category -->
  <div class="modal fade" id="catModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="catModalTitle"><i class="fa-solid fa-tag me-2"></i>Nouvelle catégorie</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="catForm" novalidate>
            <input type="hidden" id="catEditId"/>
            <div class="mb-3">
              <label class="form-label">Nom <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="catName" placeholder="Ex: Vacances" required/>
              <div class="invalid-feedback">Veuillez entrer un nom.</div>
            </div>
            <div class="mb-3">
              <label class="form-label">Description</label>
              <input type="text" class="form-control" id="catDesc" placeholder="Description optionnelle..."/>
            </div>
            <div class="mb-3">
              <label class="form-label">Couleur</label>
              <div class="color-picker-row">
                <input type="color" class="form-control form-control-color" id="catColor" value="#5C7AEA"/>
                <div class="color-presets" id="colorPresets"></div>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Icône</label>
              <div class="icon-grid" id="iconGrid"></div>
              <input type="hidden" id="catIcon" value="fa-solid fa-circle-question"/>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
          <button class="btn btn-primary" onclick="saveCat()">
            <i class="fa-solid fa-floppy-disk me-2"></i>Enregistrer
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Delete Confirm -->
  <div class="modal fade" id="deleteCatModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-body text-center py-4">
          <div class="delete-icon mb-3"><i class="fa-solid fa-trash-can fa-2x"></i></div>
          <h5>Supprimer cette catégorie ?</h5>
          <p class="text-muted small mb-0" id="deleteCatWarning"></p>
        </div>
        <div class="modal-footer justify-content-center gap-2">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
          <button class="btn btn-danger" id="confirmCatDelete">Supprimer</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    App.requireAuth();
    document.getElementById('userGreeting').textContent = 'Bonjour, ' + App.getUser().name;

    const catModal = new bootstrap.Modal(document.getElementById('catModal'));
    const delModal = new bootstrap.Modal(document.getElementById('deleteCatModal'));
    let deleteTarget = null;

    const COLOR_PRESETS = ['#5C7AEA','#F97316','#10B981','#EF4444','#8B5CF6','#F59E0B','#06B6D4','#EC4899','#84CC16','#6B7280'];
    const ICON_OPTIONS = [
      'fa-solid fa-utensils','fa-solid fa-car','fa-solid fa-house','fa-solid fa-heart-pulse',
      'fa-solid fa-film','fa-solid fa-wifi','fa-solid fa-book','fa-solid fa-ellipsis',
      'fa-solid fa-shirt','fa-solid fa-plane','fa-solid fa-gamepad','fa-solid fa-dumbbell',
      'fa-solid fa-music','fa-solid fa-gift','fa-solid fa-paw','fa-solid fa-star'
    ];

    // Build color presets
    const presets = document.getElementById('colorPresets');
    COLOR_PRESETS.forEach(color => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'color-preset';
      btn.style.background = color;
      btn.title = color;
      btn.onclick = () => document.getElementById('catColor').value = color;
      presets.appendChild(btn);
    });

    // Build icon grid
    const iconGrid = document.getElementById('iconGrid');
    ICON_OPTIONS.forEach(icon => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'icon-btn';
      btn.dataset.icon = icon;
      btn.innerHTML = `<i class="${icon}"></i>`;
      btn.onclick = () => {
        document.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('catIcon').value = icon;
      };
      iconGrid.appendChild(btn);
    });

    function renderGrid() {
      const cats = App.getCategories();
      const expenses = App.getExpenses();
      const grid = document.getElementById('catGrid');

      grid.innerHTML = cats.map(c => {
        const count = expenses.filter(e => e.category === c.name).length;
        const total = expenses.filter(e => e.category === c.name).reduce((s,e) => s+e.amount, 0);
        const isDefault = c.isDefault;
        return `
          <div class="col-12 col-sm-6 col-xl-4">
            <div class="cat-card">
              <div class="cat-card-header" style="background:${c.color}22;border-left:4px solid ${c.color}">
                <span class="cat-card-icon" style="background:${c.color};color:#fff">
                  <i class="${c.icon}"></i>
                </span>
                <div class="cat-card-info">
                  <div class="cat-card-name">${c.name}</div>
                  <div class="cat-card-desc">${c.description || 'Aucune description'}</div>
                </div>
              </div>
              <div class="cat-card-stats">
                <span><i class="fa-solid fa-receipt me-1"></i>${count} dépense${count>1?'s':''}</span>
                <span class="fw-semibold" style="color:${c.color}">${total.toFixed(3)} DT</span>
              </div>
              <div class="cat-card-actions">
                <button class="btn btn-sm btn-action-edit" onclick="editCat(${c.id})">
                  <i class="fa-solid fa-pen me-1"></i>Modifier
                </button>
                ${!isDefault ? `<button class="btn btn-sm btn-action-del" onclick="confirmDelCat(${c.id})">
                  <i class="fa-solid fa-trash me-1"></i>Supprimer
                </button>` : `<span class="badge bg-secondary">Défaut</span>`}
              </div>
            </div>
          </div>`;
      }).join('');
    }

    function openCatModal(cat = null) {
      const form = document.getElementById('catForm');
      form.classList.remove('was-validated');
      document.getElementById('catEditId').value = cat ? cat.id : '';
      document.getElementById('catName').value = cat ? cat.name : '';
      document.getElementById('catDesc').value = cat ? (cat.description || '') : '';
      document.getElementById('catColor').value = cat ? cat.color : '#5C7AEA';
      document.getElementById('catIcon').value = cat ? cat.icon : 'fa-solid fa-circle-question';
      document.getElementById('catModalTitle').innerHTML = cat
        ? '<i class="fa-solid fa-pen me-2"></i>Modifier la catégorie'
        : '<i class="fa-solid fa-tag me-2"></i>Nouvelle catégorie';

      // Highlight selected icon
      document.querySelectorAll('.icon-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.icon === (cat ? cat.icon : 'fa-solid fa-circle-question'));
      });

      catModal.show();
    }

    function editCat(id) {
      const cat = App.getCategories().find(c => c.id === id);
      if (cat) openCatModal(cat);
    }

    function saveCat() {
      const form = document.getElementById('catForm');
      form.classList.add('was-validated');
      if (!form.checkValidity()) return;

      const data = {
        name: document.getElementById('catName').value.trim(),
        description: document.getElementById('catDesc').value.trim(),
        color: document.getElementById('catColor').value,
        icon: document.getElementById('catIcon').value
      };

      const id = document.getElementById('catEditId').value;
      if (id) {
        App.updateCategory(parseInt(id), data);
      } else {
        App.addCategory(data);
      }

      catModal.hide();
      form.classList.remove('was-validated');
      renderGrid();
    }

    function confirmDelCat(id) {
      deleteTarget = id;
      const count = App.getExpenses().filter(e => e.category === App.getCategories().find(c=>c.id===id)?.name).length;
      document.getElementById('deleteCatWarning').textContent = count
        ? `Attention : ${count} dépense(s) utilisent cette catégorie.`
        : 'Cette action est irréversible.';
      delModal.show();
    }

    document.getElementById('confirmCatDelete').addEventListener('click', () => {
      if (deleteTarget !== null) {
        App.deleteCategory(deleteTarget);
        deleteTarget = null;
        delModal.hide();
        renderGrid();
      }
    });

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    renderGrid();
  </script>
</body>
</html>
