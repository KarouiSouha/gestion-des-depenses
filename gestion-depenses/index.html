<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MonBudget – Connexion</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body class="auth-page d-flex align-items-center justify-content-center min-vh-100">

  <div class="auth-card">
    <div class="auth-brand mb-4">
      <span class="brand-icon"><i class="fa-solid fa-wallet"></i></span>
      <span class="brand-name">MonBudget</span>
    </div>

    <h2 class="auth-title">Bon retour !</h2>
    <p class="auth-sub">Connectez-vous pour gérer vos dépenses.</p>

    <div id="loginAlert" class="alert alert-danger d-none" role="alert">
      <i class="fa-solid fa-circle-exclamation me-2"></i>
      <span id="loginAlertMsg">Email ou mot de passe incorrect.</span>
    </div>

    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label for="email" class="form-label">Adresse e-mail</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
          <input type="email" class="form-control" id="email" placeholder="vous@exemple.com" required/>
        </div>
      </div>
      <div class="mb-4">
        <label for="password" class="form-label">Mot de passe</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
          <input type="password" class="form-control" id="password" placeholder="••••••••" required/>
          <button class="btn btn-outline-secondary" type="button" id="togglePassword">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-lg">
        <i class="fa-solid fa-arrow-right-to-bracket me-2"></i>Se connecter
      </button>
    </form>

    <p class="auth-hint mt-4">
      <i class="fa-solid fa-circle-info me-1"></i>
      Démo : <strong>admin@demo.com</strong> / <strong>123456</strong>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Toggle password visibility
    document.getElementById('togglePassword').addEventListener('click', function () {
      const pwd = document.getElementById('password');
      const icon = this.querySelector('i');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        pwd.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });

    // Login form submission
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (App.login(email, password)) {
        window.location.href = 'dashboard.html';
      } else {
        const alert = document.getElementById('loginAlert');
        alert.classList.remove('d-none');
        setTimeout(() => alert.classList.add('d-none'), 3000);
      }
    });

    // Redirect if already logged in
    if (App.isLoggedIn()) window.location.href = 'dashboard.html';
  </script>
</body>
</html>
