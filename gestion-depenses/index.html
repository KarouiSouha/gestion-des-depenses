<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonBudget - Connexion</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <div class="row justify-content-center align-items-center vh-100">
        <div class="col-md-6 col-lg-4">
            <div class="login-card">
                <h2 class="text-center mb-3 text-primary">MonBudget</h2>
                <p class="text-center text-muted mb-4">Connectez-vous à votre compte</p>

                <!-- Message erreur -->
                <div id="loginAlert" class="alert alert-danger d-none">
                    <span id="loginAlertMsg">Adresse e-mail ou mot de passe incorrect.</span>
                </div>

                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">Adresse e-mail</label>
                        <input type="email" id="email" class="form-control" placeholder="exemple@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mot de passe</label>
                        <div class="input-group">
                            <input type="password" id="password" class="form-control" placeholder="Mot de passe" required>
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">Afficher</button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Se connecter</button>
                </form>

                <p class="text-center mt-3 mb-0">
                    Pas encore de compte ? <a href="signup.html">S'inscrire</a>
                </p>

                <hr>

                <div class="demo">
                    <strong>Compte de démonstration</strong><br>
                    Email : admin@demo.com<br>
                    Mot de passe : 123456
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
<script>
    document.getElementById("togglePassword").addEventListener("click", function () {
        const password = document.getElementById("password");
        if (password.type === "password") {
            password.type = "text";
            this.textContent = "Masquer";
        } else {
            password.type = "password";
            this.textContent = "Afficher";
        }
    });

    document.getElementById("loginForm").addEventListener("submit", function (e) {
        e.preventDefault();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        if (App.login(email, password)) {
            window.location.href = "dashboard.html";
        } else {
            const alertBox = document.getElementById("loginAlert");
            alertBox.classList.remove("d-none");
            setTimeout(() => {
                alertBox.classList.add("d-none");
            }, 3000);
        }
    });

    if (App.isLoggedIn()) {
        window.location.href = "dashboard.html";
    }
</script>
</body>
</html>
